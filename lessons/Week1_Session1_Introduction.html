<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f9f6f1">
  <title>Week 1 Session 1 - Introduction to Information and Technology Management</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f9f6f1;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    iframe{width:100%;height:100%;border:0;background:#f9f6f1}
    .loading{position:fixed;inset:0;display:grid;place-items:center;background:#f9f6f1;color:#1a6b7a;font-weight:700;letter-spacing:.02em;z-index:2}
    .error{max-width:680px;padding:2rem;text-align:center;line-height:1.6;color:#2d3748}.error a{color:#1a6b7a}
  </style>
</head>
<body>
  <div class="loading" id="loading">Loading Week 1, Session 1...</div>
  <iframe id="deck" title="Week 1 Session 1 presentation" allow="fullscreen"></iframe>
  <script>
    "use strict";
    const DATA_FILES=["../data/week1-session1-00.txt", "../data/week1-session1-01.txt", "../data/week1-session1-02.txt", "../data/week1-session1-03.txt", "../data/week1-session1-04.txt", "../data/week1-session1-05.txt", "../data/week1-session1-06.txt", "../data/week1-session1-07.txt", "../data/week1-session1-08.txt"];
    const loading=document.getElementById("loading");
    const deck=document.getElementById("deck");
    function base64ToBytes(text){const clean=text.replace(/\s/g,"");const raw=atob(clean);const bytes=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);return bytes;}
    async function gunzip(bytes){if(typeof DecompressionStream!=="function")throw new Error("Please open this lesson using the latest Google Chrome or Microsoft Edge.");const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));return new TextDecoder("utf-8").decode(await new Response(stream).arrayBuffer());}
    (async()=>{try{const responses=await Promise.all(DATA_FILES.map(path=>fetch(path,{cache:"force-cache"})));if(responses.some(response=>!response.ok))throw new Error("The lesson data could not be downloaded.");const encoded=(await Promise.all(responses.map(response=>response.text()))).join("");const html=await gunzip(base64ToBytes(encoded));const url=URL.createObjectURL(new Blob([html],{type:"text/html;charset=utf-8"}));deck.src=url;deck.addEventListener("load",()=>{loading.remove();},{once:true});addEventListener("beforeunload",()=>URL.revokeObjectURL(url),{once:true});}catch(error){loading.innerHTML=`<div class="error"><h1>Unable to open the lesson</h1><p>${error.message}</p><p><a href="../">Return to the course portal</a></p></div>`;}})();
  </script>
</body>
</html>
