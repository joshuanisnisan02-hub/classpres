<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#f9f6f1">
<title>Week 1 Session 1 - Introduction to Information and Technology Management</title>
<style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f9f6f1;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}iframe{width:100%;height:100%;border:0;background:#f9f6f1}.loading{position:fixed;inset:0;display:grid;place-items:center;background:#f9f6f1;color:#1a6b7a;font-weight:700;z-index:2}.error{max-width:680px;padding:2rem;text-align:center;line-height:1.6;color:#2d3748}.error a{color:#1a6b7a}</style>
<script>
  addEventListener("DOMContentLoaded", () => {
    const lessonId = new URLSearchParams(location.search).get("lesson");
    if (!lessonId) return;
    const lessonFrame = document.getElementById("deck");
    lessonFrame.addEventListener("load", () => {
      const timer = setInterval(() => {
        try {
          const presentation = lessonFrame.contentWindow?.slides;
          if (!presentation?.slides?.length ||
              presentation.currentSlide !== presentation.slides.length - 1) return;
          const key = "classpres-read-lessons-v1";
          const completed = new Set(JSON.parse(localStorage.getItem(key) || "[]"));
          completed.add(lessonId);
          localStorage.setItem(key, JSON.stringify([...completed]));
          clearInterval(timer);
        } catch {}
      }, 700);
      addEventListener("beforeunload", () => clearInterval(timer), { once: true });
    }, { once: true });
  });
</script>
</head>
<body>
<div class="loading" id="loading">Loading Week 1, Session 1...</div>
<iframe id="deck" title="Week 1 Session 1 presentation" allow="fullscreen">
</iframe>
<script>"use strict";const DATA_FILES=Array.from({length:7},(_,i)=>`../data/w1s1-${String(i).padStart(2,"0")}.txt`),loading=document.getElementById("loading"),deck=document.getElementById("deck");function base64ToBytes(text){const raw=atob(text.replace(/\s/g,"")),bytes=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);return bytes}async function gunzip(bytes){if(typeof DecompressionStream!=="function")throw new Error("Please open this lesson using the latest Google Chrome or Microsoft Edge.");const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));return new TextDecoder("utf-8").decode(await new Response(stream).arrayBuffer())}function sanitize(html){const doc=new DOMParser().parseFromString(html,"text/html");doc.querySelectorAll('.teacher-notes,.notes-toggle,[class*="teacher-note"],[class*="notes-toggle"],.answer-key,[class*="answer-key"],[class*="rationale"]').forEach(el=>el.remove());doc.querySelectorAll('section').forEach(section=>{const text=(section.textContent||"").replace(/\s+/g," ").trim();if(/^Answer Key\b/i.test(text)||/Answer Key\s*&\s*Rationales/i.test(text))section.remove()});doc.querySelectorAll('script').forEach(script=>{if(/show-notes|teacher-notes|notes-toggle|key\s*===?\s*["\']n["\']/i.test(script.textContent||""))script.remove()});const style=doc.createElement('style');style.textContent='.teacher-notes,.notes-toggle,[class*="teacher-note"],[class*="notes-toggle"],.answer-key,[class*="answer-key"],[class*="rationale"]{display:none!important}';doc.head.appendChild(style);return '<!DOCTYPE html>\n'+doc.documentElement.outerHTML}(async()=>{try{const responses=await Promise.all(DATA_FILES.map(path=>fetch(path,{cache:"no-cache"})));if(responses.some(r=>!r.ok))throw new Error("The lesson data could not be downloaded.");const encoded=(await Promise.all(responses.map(r=>r.text()))).join("");const html=sanitize(await gunzip(base64ToBytes(encoded)));const url=URL.createObjectURL(new Blob([html],{type:"text/html;charset=utf-8"}));deck.src=url;deck.addEventListener("load",()=>loading.remove(),{once:true});addEventListener("beforeunload",()=>URL.revokeObjectURL(url),{once:true})}catch(error){loading.innerHTML=`<div class="error">
<h1>Unable to open the lesson</h1>
<p>${error.message}</p>
<p>
<a href="../">Return to the course portal</a>
</p>
</div>`}})();</script>
</body>
</html>
